name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # nécessaire pour commit les screenshots

jobs:
  # ── 1. Vérification syntaxique & smoke test ─────────────────────────────────
  test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Vérification syntaxique
        run: node --check server.js

      - name: Installer ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Seeder la base de données de test
        run: node scripts/seed-test-db.js

      - name: Démarrer le serveur
        run: node server.js &
        env:
          PORT: 3000

      - name: Attendre que le serveur soit prêt
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/login > /dev/null 2>&1 && echo "Serveur prêt" && break
            [ $i -eq 20 ] && echo "Timeout" && exit 1
            sleep 1
          done

      - name: Vérifier la page de connexion
        run: curl -sf http://localhost:3000/login | grep -q 'AudioBoard'

      - name: Vérifier la redirection /
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          [ "$CODE" = "302" ] || [ "$CODE" = "200" ] || (echo "Code inattendu: $CODE" && exit 1)

  # ── 2. Génération des screenshots & mise à jour de la doc ───────────────────
  screenshots:
    name: Mise à jour des screenshots
    runs-on: ubuntu-latest
    needs: test
    # Exécuté sur chaque branche pour garder la doc à jour
    steps:
      - uses: actions/checkout@v4
        with:
          # Token avec droits d'écriture pour le commit des screenshots
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Installer ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Installer Playwright (Chromium uniquement)
        run: npx playwright install chromium --with-deps

      - name: Seeder la base de données de test
        run: node scripts/seed-test-db.js

      - name: Démarrer le serveur
        run: node server.js &
        env:
          PORT: 3000

      - name: Attendre que le serveur soit prêt
        run: |
          echo "Attente du serveur..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/login > /dev/null 2>&1 && echo "Serveur prêt (${i}s)" && break
            [ $i -eq 30 ] && echo "Le serveur n'a pas démarré" && exit 1
            sleep 1
          done

      - name: Générer les captures d'écran
        run: node scripts/take-screenshots.js
        env:
          APP_URL: http://localhost:3000

      - name: Committer et pousser les screenshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --staged --quiet; then
            echo "Aucun changement dans les screenshots."
          else
            git commit -m "docs: mise à jour des screenshots [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
